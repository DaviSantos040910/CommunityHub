{% load static %}
<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro | AnimeSocial</title>
  <link rel="stylesheet" href="{% static 'core/css/style.css' %}">
  <link href="https://fonts.googleapis.com/css2?family=Rubik:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
  <div class="login-page-wrapper">
    <div class="login-container">
      <h1>Crie sua conta 🎨</h1>
      <p class="login-subtitle">Junte-se à comunidade AnimeSocial</p>

      {% if error %}
        <div class="login-error">{{ error }}</div>
      {% endif %}

      <form method="post">
        {% csrf_token %}
        <input type="text" name="username" placeholder="Nome de usuário" required>
        <input type="email" name="email" placeholder="E-mail" required>
        <input type="password" name="password1" placeholder="Senha" required>
        <input type="password" name="password2" placeholder="Confirme a senha" required>
        <button type="submit">Cadastrar</button>
      </form>

      <p class="login-footer">
        Já tem uma conta? <a href="{% url 'login' %}">Entrar</a>
      </p>
    </div>
  </div>
</body>
</html>
